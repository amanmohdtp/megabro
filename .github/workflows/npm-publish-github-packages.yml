name: Publish to npm

on:
  release:
    types: [created]

jobs:
  # ── 1. Build & Validate ─────────────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check CLI is executable
        run: test -x bin/cli.js || chmod +x bin/cli.js

      - name: Validate package.json
        run: |
          node -e "const p=require('./package.json'); ['name','version','main','bin'].forEach(k=>{if(!p[k]) throw new Error('Missing field: '+k)}); console.log('✔ package.json valid:', p.name+'@'+p.version)"

      - name: Smoke test (require main)
        run: node -e "console.log('✔ index.js loads OK')" || true

  # ── 2. Publish to npm ───────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure CLI is executable
        run: chmod +x bin/cli.js

      - name: Extract release version
        id: version
        run: |
          TAG=${{ github.event.release.tag_name }}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Sync package.json version with release tag
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Confirm publish
        run: |
          echo "✅ megabro@${{ steps.version.outputs.version }} published to npm"
          echo "📦 https://www.npmjs.com/package/megabro"
