name: Node.js Package

on:
  push:
    branches: [ main ]
  release:
    types: [created]
  workflow_dispatch: {} # Allows you to manually click "Run workflow" in GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # If you don't have a test script yet, this line might fail. 
      # You can change it to: run: npm test || echo "No tests found"
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          
      - run: npm ci

      - name: Validate package.json
        run: |
          node -e "const p=require('./package.json'); ['name','version','main','bin'].forEach(k=>{if(!p[k]) throw new Error('Missing field: '+k)}); console.log('✔ package.json valid:', p.name+'@'+p.version)"

      - name: Publish to npm
        run: npm publish --access public
        env:
          # Ensure this matches the EXACT name in your GitHub Repo Secrets
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
