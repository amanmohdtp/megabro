<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MEGABRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF6EE;
  --cream2:#F2EBE0;
  --cream3:#E8DFD2;
  --brown:#3D2B1F;
  --brown2:#6B4C3B;
  --muted:#A08070;
  --acc:#c8c430;
  --acc-pale:#F5F8A4;
  --tv-body:#2C2016;
  --tv-bezel:#1A1208;
  --tv-screen:#0a0a0a;
  --green:#5a9a5a;
  --red:#c0504d;
}
html,body{height:100%;overflow:hidden;background:var(--cream)}
body{font-family:'Space Mono',monospace;color:var(--brown)}

/* ─── SCREENS ────────────────────────────────────────────── */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;transition:opacity .4s}
.screen.gone{opacity:0;pointer-events:none}

/* ─── API KEY SCREEN ─────────────────────────────────────── */
#screen-key{background:var(--cream);flex-direction:column;gap:0}
.key-wrap{
  background:#fff;
  border:2px solid var(--cream3);
  border-radius:16px;
  padding:48px 44px 40px;
  width:100%;max-width:400px;
  text-align:center;
  box-shadow:0 8px 40px rgba(61,43,31,.08);
}
.key-logo{width:72px;height:72px;object-fit:contain;margin:0 auto 20px;display:block}
.key-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:38px;letter-spacing:.07em;
  color:var(--brown);margin-bottom:4px;
}
.key-sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:32px}
.key-field{
  width:100%;
  border:1.5px solid var(--cream3);
  border-radius:8px;
  padding:12px 16px;
  font-family:'Space Mono',monospace;
  font-size:13px;
  color:var(--brown);
  background:var(--cream);
  outline:none;
  text-align:center;
  transition:border-color .2s;
  margin-bottom:8px;
}
.key-field:focus{border-color:var(--acc)}
.key-err{font-size:11px;color:var(--red);min-height:18px;margin-bottom:10px;text-align:center}
.key-btn{
  width:100%;
  background:var(--brown);
  color:var(--acc-pale);
  border:none;
  border-radius:8px;
  padding:14px;
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:.1em;
  cursor:pointer;
  transition:background .2s,transform .15s;
}
.key-btn:hover{background:var(--brown2)}
.key-btn:active{transform:scale(.98)}
.key-note{margin-top:18px;font-size:10px;color:var(--muted)}
.key-note a{color:var(--brown2);text-decoration:none}
.key-note a:hover{text-decoration:underline}

/* ─── LOADING SCREEN ─────────────────────────────────────── */
#screen-loading{background:var(--cream);flex-direction:column;gap:24px}
.loading-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;letter-spacing:.1em;
  color:var(--brown);
}
.loading-bar-track{
  width:260px;height:5px;
  background:var(--cream3);
  border-radius:3px;overflow:hidden;
}
.loading-bar-fill{
  height:100%;
  background:linear-gradient(90deg,var(--acc),var(--acc-pale));
  border-radius:3px;
  width:0%;
  transition:width .1s linear;
}
.loading-msg{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* ─── MAIN APP ────────────────────────────────────────────── */
#screen-app{background:var(--cream);flex-direction:column;overflow:hidden}

/* Top strip */
#topbar{
  width:100%;
  padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1.5px solid var(--cream3);
  flex-shrink:0;
  background:var(--cream);
}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-logo{width:26px;height:26px;object-fit:contain}
.tb-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:.07em;color:var(--brown);
}
.tb-right{display:flex;align-items:center;gap:16px}
.pill{
  display:flex;align-items:center;gap:6px;
  font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;
  background:var(--cream2);
  border:1px solid var(--cream3);
  border-radius:20px;padding:4px 12px;
}
.pill-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green)}
.tb-key-btn{
  background:transparent;border:1.5px solid var(--cream3);
  color:var(--brown2);
  font-family:'Space Mono',monospace;font-size:10px;
  padding:5px 14px;border-radius:6px;cursor:pointer;
  text-transform:uppercase;letter-spacing:.08em;
  transition:border-color .2s,color .2s;
}
.tb-key-btn:hover{border-color:var(--brown2);color:var(--brown)}

/* Center — the TV */
#tv-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:20px 0 8px;
}

/* ─── TV FRAME ────────────────────────────────────────────── */
.tv{
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.tv-cabinet{
  background:linear-gradient(160deg,#3a2a18 0%,#2C2016 50%,#221a0e 100%);
  border-radius:28px;
  padding:22px 22px 26px;
  box-shadow:
    0 0 0 3px #1A1208,
    0 20px 60px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.06);
  position:relative;
}
/* Knobs row */
.tv-knobs{
  position:absolute;right:18px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:10px;
}
.knob{
  width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#5a4a38,#2a1e12);
  border:2px solid #1a1208;
  box-shadow:0 2px 4px rgba(0,0,0,.5);
}
/* Logo badge on cabinet */
.tv-brand-badge{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;letter-spacing:.2em;
  color:rgba(245,248,164,.3);
}
/* Screen bezel */
.tv-bezel{
  background:#111;
  border-radius:16px;
  padding:10px;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.8);
  width:680px;
  /* leave room for knobs */
  margin-right:28px;
}
/* The actual screen */
.tv-screen{
  background:var(--tv-screen);
  border-radius:10px;
  width:100%;
  aspect-ratio:4/3;
  overflow:hidden;
  position:relative;
  /* CRT glow effect */
  box-shadow:
    inset 0 0 40px rgba(0,0,0,.6),
    0 0 20px rgba(245,248,164,.08);
}
/* scanlines on screen */
.tv-screen::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    to bottom,transparent 0px,transparent 3px,rgba(0,0,0,.15) 3px,rgba(0,0,0,.15) 4px
  );
  pointer-events:none;z-index:10;border-radius:10px;
}
/* screen curvature vignette */
.tv-screen::before{
  content:'';position:absolute;inset:0;z-index:11;
  background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.5) 100%);
  pointer-events:none;border-radius:10px;
}

/* ─── IDLE / DINO SCREEN ─────────────────────────────────── */
#idle-screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;
  background:#0a0a0a;
  z-index:5;
}
.dino-ground{
  position:absolute;bottom:70px;left:0;right:0;
  height:2px;background:#333;
}
.dino-scene{position:relative;width:300px;height:70px}
/* SVG dino */
.dino-svg{position:absolute;left:40px;bottom:0;animation:dino-run .3s steps(2) infinite}
@keyframes dino-run{0%{transform:scaleX(1)}100%{transform:scaleX(1)}}
/* cactus */
.cactus{position:absolute;right:30px;bottom:0}
.idle-press{
  font-family:'Space Mono',monospace;
  font-size:11px;color:#555;
  text-transform:uppercase;letter-spacing:.15em;
  animation:blink 1.1s step-start infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.idle-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:.15em;color:#444;
}
.idle-clouds{position:absolute;top:20px;left:0;right:0;display:flex;gap:60px;padding:0 30px}
.cloud{width:40px;height:14px;background:#1a1a1a;border-radius:7px;animation:cloud-move 8s linear infinite}
.cloud:nth-child(2){animation-delay:-3s;width:28px;height:10px}
.cloud:nth-child(3){animation-delay:-6s;width:50px;height:16px}
@keyframes cloud-move{from{transform:translateX(300px)}to{transform:translateX(-100px)}}

/* ─── CHAT SCREEN ────────────────────────────────────────── */
#chat-screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  background:#0d0d0d;
  z-index:5;
  opacity:0;pointer-events:none;
  transition:opacity .5s;
}
#chat-screen.active{opacity:1;pointer-events:all}

#chat-msgs{
  flex:1;overflow-y:auto;
  padding:18px 20px;
  display:flex;flex-direction:column;gap:12px;
}
#chat-msgs::-webkit-scrollbar{width:3px}
#chat-msgs::-webkit-scrollbar-thumb{background:#222}

.msg{display:flex;gap:10px;animation:fadeup .2s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg-av{
  width:22px;height:22px;border-radius:4px;
  flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;
}
.msg.user .msg-av{background:var(--acc);color:#000}
.msg.bot  .msg-av{background:#1e1e1e;border:1px solid #2a2a2a;overflow:hidden}
.msg.bot  .msg-av img{width:18px;height:18px;object-fit:contain}
.msg-content{flex:1}
.msg-who{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.msg-text{
  font-size:12px;line-height:1.65;color:#ccc;
  white-space:pre-wrap;word-break:break-word;
}
.msg.user .msg-text{color:var(--acc-pale)}
.msg-text code{
  background:#1a1a1a;border:1px solid #2a2a2a;
  padding:1px 5px;border-radius:3px;
  font-size:11px;color:var(--acc-pale);
}
.msg-text pre{
  background:#141414;border:1px solid #222;
  padding:10px;border-radius:6px;
  overflow-x:auto;margin:6px 0;font-size:11px;color:#aaa;
}

.typing-dots{display:flex;gap:4px;padding:4px 0}
.typing-dots span{
  width:5px;height:5px;border-radius:50%;
  background:var(--acc);opacity:.3;
  animation:tdot 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* chat input inside screen */
#chat-input-bar{
  padding:10px 14px;
  border-top:1px solid #1a1a1a;
  display:flex;align-items:center;gap:8px;
  background:#0a0a0a;
  flex-shrink:0;
}
#chat-input-bar .prompt{color:var(--acc);font-size:13px;flex-shrink:0}
#chat-ta{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Space Mono',monospace;font-size:12px;color:#ccc;
  resize:none;min-height:20px;max-height:80px;overflow-y:auto;
}
#chat-ta::placeholder{color:#333}
#chat-send{
  background:var(--acc);border:none;
  width:28px;height:28px;border-radius:5px;
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
#chat-send:hover{background:var(--acc2, #a8a820);transform:scale(1.05)}
#chat-send:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* Bottom strip */
#bottombar{
  padding:8px 28px;
  border-top:1.5px solid var(--cream3);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;background:var(--cream);
}
.bbar-left{display:flex;gap:20px}
.bstat{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.bstat span{color:var(--brown);font-weight:700}
.model-sel{
  background:var(--cream2);border:1.5px solid var(--cream3);
  color:var(--brown2);
  font-family:'Space Mono',monospace;font-size:10px;
  padding:4px 10px;border-radius:5px;outline:none;cursor:pointer;
  appearance:none;
}

/* responsive */
@media(max-width:760px){
  .tv-bezel{width:calc(100vw - 80px)}
  .tv-knobs{display:none}
  .tv-bezel{margin-right:0}
}
</style>
</head>
<body>

<!-- ─── 1. API KEY ──────────────────────────────────────────────────────── -->
<div class="screen" id="screen-key">
  <div class="key-wrap">
    <img class="key-logo" src="https://s6.imgcdn.dev/Yx103M.png" alt="Megabro" onerror="this.style.display='none'"/>
    <div class="key-title">MEGABRO</div>
    <div class="key-sub">Enter your Gemini API key</div>
    <input class="key-field" type="password" id="key-in" placeholder="AIzaSy..." autocomplete="off"/>
    <div class="key-err" id="key-err"></div>
    <button class="key-btn" id="key-btn">BOOT SYSTEM</button>
    <p class="key-note">Free key at <a href="https://aistudio.google.com/" target="_blank">aistudio.google.com</a><br/>Stays in your browser only.</p>
  </div>
</div>

<!-- ─── 2. LOADING ─────────────────────────────────────────────────────── -->
<div class="screen gone" id="screen-loading">
  <img src="https://s6.imgcdn.dev/Yx103M.png" style="width:52px;height:52px;object-fit:contain;animation:float 3s ease-in-out infinite" alt="" onerror="this.style.display='none'"/>
  <div class="loading-title" id="load-msg">Initialising...</div>
  <div class="loading-bar-track">
    <div class="loading-bar-fill" id="load-bar"></div>
  </div>
  <div class="loading-msg" id="load-sub">Waking up the bro</div>
</div>

<!-- ─── 3. MAIN APP ────────────────────────────────────────────────────── -->
<div class="screen gone" id="screen-app">

  <div id="topbar">
    <div class="tb-brand">
      <img class="tb-logo" src="https://s6.imgcdn.dev/Yx103M.png" alt="" onerror="this.style.display='none'"/>
      <span class="tb-name">MEGABRO</span>
    </div>
    <div class="tb-right">
      <div class="pill"><div class="pill-dot"></div>Online</div>
      <button class="tb-key-btn" id="change-key-btn">Change Key</button>
    </div>
  </div>

  <div id="tv-area">
    <div class="tv">
      <div class="tv-cabinet">
        <!-- Knobs -->
        <div class="tv-knobs">
          <div class="knob"></div>
          <div class="knob"></div>
          <div class="knob"></div>
        </div>
        <!-- Screen bezel -->
        <div class="tv-bezel">
          <div class="tv-screen">

            <!-- IDLE: dino screen -->
            <div id="idle-screen">
              <div class="idle-clouds">
                <div class="cloud"></div>
                <div class="cloud"></div>
                <div class="cloud"></div>
              </div>
              <div class="idle-title">MEGABRO</div>
              <div class="dino-scene">
                <!-- dino SVG -->
                <svg class="dino-svg" width="44" height="52" viewBox="0 0 44 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="16" y="2" width="20" height="14" rx="3" fill="#F5F8A4"/>
                  <rect x="28" y="4" width="4" height="4" rx="1" fill="#0a0a0a"/>
                  <rect x="34" y="8" width="8" height="4" rx="2" fill="#F5F8A4"/>
                  <rect x="10" y="14" width="26" height="22" rx="3" fill="#F5F8A4"/>
                  <rect x="6" y="18" width="8" height="4" rx="2" fill="#F5F8A4"/>
                  <rect x="16" y="34" width="8" height="16" rx="2" fill="#F5F8A4" id="leg-l"/>
                  <rect x="26" y="34" width="8" height="16" rx="2" fill="#F5F8A4" id="leg-r"/>
                </svg>
                <!-- cactus -->
                <svg class="cactus" width="22" height="40" viewBox="0 0 22 40" fill="#2a4a2a">
                  <rect x="8" y="10" width="6" height="30" rx="3"/>
                  <rect x="0" y="18" width="10" height="5" rx="2"/>
                  <rect x="12" y="22" width="10" height="5" rx="2"/>
                  <rect x="0" y="14" width="5" height="9" rx="2"/>
                  <rect x="17" y="18" width="5" height="9" rx="2"/>
                </svg>
              </div>
              <div class="dino-ground"></div>
              <div class="idle-press">Press Enter to start chatting</div>
            </div>

            <!-- CHAT screen (inside TV) -->
            <div id="chat-screen">
              <div id="chat-msgs"></div>
              <div id="chat-input-bar">
                <span class="prompt">›</span>
                <textarea id="chat-ta" rows="1" placeholder="Ask anything..."></textarea>
                <button id="chat-send">
                  <svg width="12" height="12" fill="none" stroke="#000" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"/>
                  </svg>
                </button>
              </div>
            </div>

          </div><!-- tv-screen -->
        </div><!-- tv-bezel -->
        <div class="tv-brand-badge">MEGABRO</div>
      </div><!-- tv-cabinet -->
    </div><!-- tv -->
  </div>

  <div id="bottombar">
    <div class="bbar-left">
      <div class="bstat">Messages <span id="b-msgs">0</span></div>
      <div class="bstat">Tokens <span id="b-toks">0</span></div>
    </div>
    <select class="model-sel" id="model-sel">
      <option value="gemini-2.0-flash">gemini-2.0-flash</option>
      <option value="gemini-1.5-flash">gemini-1.5-flash</option>
      <option value="gemini-1.5-pro">gemini-1.5-pro</option>
    </select>
  </div>

</div><!-- screen-app -->

<style>
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
/* Leg animation */
#leg-l{animation:leg-a .3s alternate infinite}
#leg-r{animation:leg-a .3s alternate-reverse infinite}
@keyframes leg-a{from{transform:translateY(0)}to{transform:translateY(4px)}}
</style>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let apiKey = sessionStorage.getItem('mb_key') || '';
let history = [];
let msgCount = 0, tokenEst = 0;
let busy = false;
let chatStarted = false;

// ── DOM ───────────────────────────────────────────────────────────────────────
const $sKey     = document.getElementById('screen-key');
const $sLoad    = document.getElementById('screen-loading');
const $sApp     = document.getElementById('screen-app');
const $keyIn    = document.getElementById('key-in');
const $keyErr   = document.getElementById('key-err');
const $keyBtn   = document.getElementById('key-btn');
const $loadBar  = document.getElementById('load-bar');
const $loadMsg  = document.getElementById('load-msg');
const $loadSub  = document.getElementById('load-sub');
const $idle     = document.getElementById('idle-screen');
const $chatScr  = document.getElementById('chat-screen');
const $chatMsgs = document.getElementById('chat-msgs');
const $chatTa   = document.getElementById('chat-ta');
const $chatSend = document.getElementById('chat-send');
const $bMsgs    = document.getElementById('b-msgs');
const $bToks    = document.getElementById('b-toks');
const $modelSel = document.getElementById('model-sel');

// ── Boot flow ─────────────────────────────────────────────────────────────────
function show(el)  { el.classList.remove('gone'); }
function hide(el)  { el.classList.add('gone'); }

async function runLoader() {
  const steps = [
    { pct: 20, msg: 'Initialising...',     sub: 'Waking up the bro' },
    { pct: 45, msg: 'Loading modules...',  sub: 'Setting up AI bridge' },
    { pct: 70, msg: 'Connecting API...',   sub: 'Reaching Gemini' },
    { pct: 90, msg: 'Almost ready...',     sub: 'Booting interface' },
    { pct: 100,msg: 'Ready!',              sub: 'Welcome back, bro' },
  ];
  for (const s of steps) {
    $loadBar.style.width = s.pct + '%';
    $loadMsg.textContent = s.msg;
    $loadSub.textContent = s.sub;
    await sleep(320 + Math.random() * 180);
  }
  await sleep(300);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function boot() {
  const k = $keyIn.value.trim();
  if (!k) { $keyErr.textContent = 'Please enter your API key.'; return; }
  if (!k.startsWith('AIza')) { $keyErr.textContent = 'Key should start with AIza...'; return; }
  apiKey = k;
  sessionStorage.setItem('mb_key', k);

  hide($sKey);
  show($sLoad);
  await runLoader();
  hide($sLoad);
  show($sApp);
  $chatTa.focus();
}

// Auto-boot if key saved
(async () => {
  if (apiKey) {
    hide($sKey);
    show($sLoad);
    await runLoader();
    hide($sLoad);
    show($sApp);
  }
})();

$keyBtn.addEventListener('click', boot);
$keyIn.addEventListener('keydown', e => { if (e.key === 'Enter') boot(); });

// Change key
document.getElementById('change-key-btn').addEventListener('click', () => {
  hide($sApp);
  $keyIn.value = '';
  $keyErr.textContent = '';
  show($sKey);
  $keyIn.focus();
});

// ── Chat ──────────────────────────────────────────────────────────────────────
function startChat() {
  if (chatStarted) return;
  chatStarted = true;
  $idle.style.opacity = '0';
  $idle.style.transition = 'opacity .4s';
  setTimeout(() => { $idle.style.display = 'none'; $chatScr.classList.add('active'); }, 400);
}

// Press Enter on idle screen → activate chat
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !chatStarted && !$sApp.classList.contains('gone') && !e.target.matches('textarea,input')) {
    startChat();
    setTimeout(() => $chatTa.focus(), 450);
  }
});

// Also clicking/typing in input starts chat
$chatTa.addEventListener('focus', startChat);

$chatTa.addEventListener('input', () => {
  $chatTa.style.height = 'auto';
  $chatTa.style.height = Math.min($chatTa.scrollHeight, 80) + 'px';
});

$chatTa.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
$chatSend.addEventListener('click', send);

async function send() {
  const text = $chatTa.value.trim();
  if (!text || busy) return;

  startChat();
  $chatTa.value = '';
  $chatTa.style.height = 'auto';
  busy = true;
  $chatSend.disabled = true;

  addMsg('user', text);
  history.push({ role: 'user', parts: [{ text }] });
  msgCount++; tokenEst += Math.ceil(text.length / 4);
  updateStats();

  const typingEl = addTyping();
  $chatMsgs.scrollTop = $chatMsgs.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        apiKey,
        history: history.slice(0, -1),
        model: $modelSel.value
      })
    });
    const data = await res.json();
    typingEl.remove();

    if (data.error) {
      addMsg('bot', 'Error: ' + data.error);
    } else {
      addMsg('bot', data.reply);
      history.push({ role: 'model', parts: [{ text: data.reply }] });
      msgCount++; tokenEst += Math.ceil(data.reply.length / 4);
    }
  } catch (err) {
    typingEl.remove();
    addMsg('bot', 'Network error. Is the server running?');
  }

  updateStats();
  busy = false;
  $chatSend.disabled = false;
  $chatMsgs.scrollTop = $chatMsgs.scrollHeight;
  $chatTa.focus();
}

function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  const av = role === 'user'
    ? '<div class="msg-av" style="background:#c8c430;color:#000">U</div>'
    : '<div class="msg-av"><img src="https://s6.imgcdn.dev/Yx103M.png" onerror="this.parentElement.textContent=\'AI\'"/></div>';
  d.innerHTML = `${av}<div class="msg-content">
    <div class="msg-who">${role === 'user' ? 'You' : 'Megabro'}</div>
    <div class="msg-text">${fmt(text)}</div>
  </div>`;
  $chatMsgs.appendChild(d);
  $chatMsgs.scrollTop = $chatMsgs.scrollHeight;
  return d;
}

function addTyping() {
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `<div class="msg-av"><img src="https://s6.imgcdn.dev/Yx103M.png" onerror="this.parentElement.textContent='AI'"/></div>
    <div class="msg-content">
      <div class="msg-who">Megabro</div>
      <div class="msg-text"><div class="typing-dots"><span></span><span></span><span></span></div></div>
    </div>`;
  $chatMsgs.appendChild(d);
  return d;
}

function fmt(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`\n]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--acc-pale)">$1</strong>');
}

function updateStats() {
  $bMsgs.textContent = msgCount;
  $bToks.textContent = tokenEst > 999 ? (tokenEst/1000).toFixed(1)+'k' : tokenEst;
}
</script>
</body>
</html>
